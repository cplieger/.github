name: Feature request
description: Propose an enhancement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Describe the need first, then the proposed
        solution, so the trade-offs can be weighed.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What need or use case is unmet?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have evaluated.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true
