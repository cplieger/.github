name: Bug report
description: Report a defect.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction (code/commands).
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Library version / commit, and language runtime version.
    validations:
      required: true
